name: Release

# Cut a release with an annotated version tag after pushing main. The tag must
# match the version in src-tauri/tauri.conf.json, e.g.:
#   git push origin main
#   git tag -a vX.Y.Z -m "Harbor vX.Y.Z"
#   git push origin vX.Y.Z
# See DISTRIBUTING.md for the complete versioning, verification, and publishing
# checklist.
# Builds a UNIVERSAL (Intel + Apple Silicon) .dmg and attaches it to a draft
# GitHub Release. Production releases fail closed unless both Apple/Faba and
# Tauri updater signing credentials are present (see DISTRIBUTING.md).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # tauri-action needs this to create the Release

jobs:
  release:
    runs-on: macos-latest # Apple Silicon runner; we cross-compile a universal binary
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify release tag belongs to main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          commit=$(git rev-parse "$GITHUB_SHA^{commit}")
          if ! git merge-base --is-ancestor "$commit" origin/main; then
            echo "::error::Release tags must point to a commit on main."
            exit 1
          fi

      - name: Install Rust (with both macOS targets for a universal build)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Verify release version matches tag
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const packageLockJson = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const packageLock = packageLockJson.version;
          const packageLockRoot = packageLockJson.packages?.[""]?.version;
          const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargoText = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargo = cargoText.match(/^version = "([^"]+)"/m)?.[1];
          const cargoLockText = fs.readFileSync("src-tauri/Cargo.lock", "utf8");
          const cargoLock = cargoLockText.match(
            /\[\[package\]\]\nname = "harbor"\nversion = "([^"]+)"/,
          )?.[1];
          const bridgeCargoText = fs.readFileSync(
            "src-tauri/mcp-bridge/Cargo.toml",
            "utf8",
          );
          const bridgeCargo = bridgeCargoText.match(/^version = "([^"]+)"/m)?.[1];
          const bridgeCargoLockText = fs.readFileSync(
            "src-tauri/mcp-bridge/Cargo.lock",
            "utf8",
          );
          const bridgeCargoLock = bridgeCargoLockText.match(
            /\[\[package\]\]\nname = "harbor-mcp-bridge"\nversion = "([^"]+)"/,
          )?.[1];
          const versions = {
            tag,
            package: pkg,
            packageLock,
            packageLockRoot,
            tauri,
            cargo,
            cargoLock,
          };
          if (
            !cargo ||
            !cargoLock ||
            !bridgeCargo ||
            !bridgeCargoLock ||
            bridgeCargo !== bridgeCargoLock ||
            new Set(Object.values(versions)).size !== 1
          ) {
            console.error("Release version mismatch:", {
              ...versions,
              bridgeCargo,
              bridgeCargoLock,
            });
            process.exit(1);
          }
          console.log(`Release version ${tag} is consistent.`);
          NODE

      - name: Verify native bridge version tracks binary changes
        run: |
          previous_tag="$(
            git tag --merged "$GITHUB_SHA^{commit}" --sort=-v:refname --list 'v*.*.*' \
              | grep -Fxv "$GITHUB_REF_NAME" \
              | head -n 1 \
              || true
          )"
          if [ -z "$previous_tag" ] || \
             ! git cat-file -e "${previous_tag}:src-tauri/mcp-bridge/Cargo.toml" 2>/dev/null
          then
            echo "First native bridge release; no prior bridge version to compare."
            exit 0
          fi

          current_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' \
            src-tauri/mcp-bridge/Cargo.toml | head -n 1)"
          previous_version="$(git show \
            "${previous_tag}:src-tauri/mcp-bridge/Cargo.toml" \
            | sed -n 's/^version = "\([^"]*\)"/\1/p' \
            | head -n 1)"
          if ! git diff --quiet "${previous_tag}^{commit}" "$GITHUB_SHA^{commit}" -- \
            src-tauri/mcp-bridge/Cargo.toml \
            src-tauri/mcp-bridge/Cargo.lock \
            src-tauri/mcp-bridge/src
          then
            if [ "$current_version" = "$previous_version" ]; then
              echo "::error::Native bridge binary inputs changed since ${previous_tag}, but its version is still ${current_version}."
              exit 1
            fi
          fi
          echo "Native bridge version ${current_version} is consistent with ${previous_tag}."

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend
        run: |
          npm test
          npm run build
          node --check scripts/mcp-bridge-soak.mjs
          node --check scripts/prepare-native-bridge.mjs

      - name: Prepare native MCP bridge for Rust checks
        run: npm run prepare:bridge

      - name: Verify Retina DMG background
        run: |
          image="src-tauri/dmg-background.png"
          width=$(sips -g pixelWidth "$image" | awk '/pixelWidth/ {print $2}')
          height=$(sips -g pixelHeight "$image" | awk '/pixelHeight/ {print $2}')
          dpi_width=$(sips -g dpiWidth "$image" | awk '/dpiWidth/ {print $2}')
          dpi_height=$(sips -g dpiHeight "$image" | awk '/dpiHeight/ {print $2}')
          test "$width" = 1200
          test "$height" = 800
          test "$dpi_width" = 144.000
          test "$dpi_height" = 144.000

      - name: Verify Rust formatting
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo fmt --manifest-path src-tauri/mcp-bridge/Cargo.toml --all -- --check

      - name: Lint Rust core
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings
          cargo clippy --manifest-path src-tauri/mcp-bridge/Cargo.toml --locked --all-targets -- -D warnings

      - name: Verify Rust core and MCP tests
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --locked
          cargo test --manifest-path src-tauri/mcp-bridge/Cargo.toml --locked

      - name: Verify release signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required release secret: $name"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          target_commitish=$(git rev-parse "$GITHUB_SHA^{commit}")
          notes=$(gh api --method POST \
            "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" \
            -f target_commitish="$target_commitish" \
            --jq .body)
          delimiter="HARBOR_NOTES_$(uuidgen)"
          {
            echo "body<<$delimiter"
            echo '**Know what’s running. Stop the port chaos.**'
            echo
            echo 'Harbor is a Mac control center for understanding local servers, starting complete projects, and giving Claude or Codex a shared source of truth through MCP.'
            echo
            printf '%s\n' "$notes"
            echo
            echo '## Install'
            echo
            echo 'Download the universal `.dmg` below, open it, and drag Harbor to Applications.'
            echo
            echo '- macOS 11 Big Sur or later'
            echo '- Apple Silicon and Intel'
            echo '- signed and notarized'
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, notarize, and publish
        # Pin the action that receives Apple and updater signing credentials.
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HARBOR_BUILD_UNIVERSAL_BRIDGE: "1"
          HARBOR_BRIDGE_PROFILE: release
        with:
          args: --target universal-apple-darwin
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          tagName: ${{ github.ref_name }}
          releaseName: "Harbor ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false

      - name: Verify signed universal native MCP bridge
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sidecar="src-tauri/target/universal-apple-darwin/release/bundle/macos/Harbor.app/Contents/MacOS/harbor-mcp-bridge"
          test -x "$sidecar"
          /usr/bin/lipo "$sidecar" -verify_arch arm64 x86_64
          codesign --verify --strict --verbose=2 "$sidecar"
          team_id="$(codesign -dv --verbose=4 "$sidecar" 2>&1 \
            | sed -n 's/^TeamIdentifier=//p')"
          test "$team_id" = "$APPLE_TEAM_ID"
          bridge_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' \
            src-tauri/mcp-bridge/Cargo.toml | head -n 1)"
          test "$("$sidecar" --version)" = "harbor-mcp-bridge $bridge_version"
          standalone="$(mktemp -d)/harbor-mcp-bridge"
          cp "$sidecar" "$standalone"
          chmod 700 "$standalone"
          codesign --verify --strict --verbose=2 "$standalone"
          test "$("$standalone" --version)" = "harbor-mcp-bridge $bridge_version"

      # Tauri notarizes and staples the app before creating the DMG. Submit the
      # finished DMG as well so Gatekeeper can verify the exact outermost file
      # users download, including when their Mac is offline.
      - name: Notarize, staple, and replace signed DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          dmg="src-tauri/target/universal-apple-darwin/release/bundle/dmg/Harbor_${version}_universal.dmg"

          test -f "$dmg"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          codesign --verify --strict --verbose=2 "$dmg"
          spctl -a -vvv -t open --context context:primary-signature "$dmg"
          gh release upload "$GITHUB_REF_NAME" "$dmg" --clobber

      - name: Verify updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir=$(mktemp -d)
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            | jq -e --arg tag "$GITHUB_REF_NAME" '
                [.[] | select(.tag_name == $tag)] |
                if length == 1 then .[0] else error("release not found or duplicated") end
              ' > "$dir/release.json"

          archive="$dir/Harbor_${version}_universal.app.tar.gz"
          signature_file="$archive.sig"
          for name in latest.json "$(basename "$archive")" "$(basename "$signature_file")"; do
            asset_id=$(jq -er --arg name "$name" \
              '.assets[] | select(.name == $name) | .id' "$dir/release.json")
            gh api -H "Accept: application/octet-stream" \
              "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" > "$dir/$name"
            test -s "$dir/$name"
          done

          signature=$(tr -d '\r\n' < "$signature_file")
          archive_url=$(jq -er --arg name "$(basename "$archive")" \
            '.assets[] | select(.name == $name) | .url' "$dir/release.json")

          jq -e \
            --arg version "$version" \
            --arg signature "$signature" \
            --arg archive_url "$archive_url" '
            . as $release |
            ($release.version == $version) and
            ([
              "darwin-aarch64-app",
              "darwin-x86_64-app",
              "darwin-aarch64",
              "darwin-x86_64"
            ] | all(
              . as $target |
              ($release.platforms[$target].signature == $signature) and
              ($release.platforms[$target].url == $archive_url)
            ))
          ' "$dir/latest.json"

          cargo run --locked \
            --manifest-path src-tauri/Cargo.toml \
            --example verify_update_signature \
            -- "$archive" "$signature_file" \
            "$(jq -r '.plugins.updater.pubkey' src-tauri/tauri.conf.json)"

          mkdir "$dir/extracted"
          tar -xzf "$archive" -C "$dir/extracted"
          app="$dir/extracted/Harbor.app"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl -a -vvv -t execute "$app"
          xcrun stapler validate "$app"
          sidecar="$app/Contents/MacOS/harbor-mcp-bridge"
          test -x "$sidecar"
          /usr/bin/lipo "$sidecar" -verify_arch arm64 x86_64
          codesign --verify --strict --verbose=2 "$sidecar"
          team_id="$(codesign -dv --verbose=4 "$sidecar" 2>&1 \
            | sed -n 's/^TeamIdentifier=//p')"
          test "$team_id" = "$APPLE_TEAM_ID"
          bridge_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' \
            src-tauri/mcp-bridge/Cargo.toml | head -n 1)"
          test "$("$sidecar" --version)" = "harbor-mcp-bridge $bridge_version"
          standalone="$dir/harbor-mcp-bridge"
          cp "$sidecar" "$standalone"
          chmod 700 "$standalone"
          codesign --verify --strict --verbose=2 "$standalone"
          test "$("$standalone" --version)" = "harbor-mcp-bridge $bridge_version"
