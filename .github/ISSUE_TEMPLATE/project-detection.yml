name: Project detection problem
description: Report missing, incorrect, or incomplete service detection for a project.
title: "[Project detection]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Help us understand the project shape without exposing the project itself.

        > **Protect your privacy:** Do not post tokens, passwords, credentials, `.env` contents, or private filesystem paths. Redact usernames and project names, and share only sanitized file names or excerpts.
  - type: input
    id: harbor-version
    attributes:
      label: Harbor version
      placeholder: "0.4.1"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "15.5"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple silicon
        - Intel
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: add-method
    attributes:
      label: How was the project added?
      options:
        - Add project button
        - Drag and drop
        - Added by an AI client over MCP
        - Existing Harbor project
        - Other
    validations:
      required: true
  - type: input
    id: stack
    attributes:
      label: Project stack
      description: List relevant tools and versions without sharing repository names or paths.
      placeholder: Next.js 15, pnpm 10, PostgreSQL 17
    validations:
      required: true
  - type: textarea
    id: project-shape
    attributes:
      label: Sanitized project shape
      description: List relevant manifest and workspace file names. Do not paste source files, `.env` contents, or full paths.
      placeholder: |
        package.json
        pnpm-workspace.yaml
        apps/web/package.json
        apps/api/package.json
    validations:
      required: true
  - type: textarea
    id: detected
    attributes:
      label: What did Harbor detect?
      description: List the proposed services, commands, ports, or dependencies that looked wrong or were missing.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should Harbor have detected?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add a project with the sanitized shape above
        2. Review the detected services
        3. ...
    validations:
      required: true
  - type: checkboxes
    id: privacy-check
    attributes:
      label: Privacy check
      options:
        - label: I removed tokens, credentials, `.env` contents, and private filesystem paths from this report.
          required: true
