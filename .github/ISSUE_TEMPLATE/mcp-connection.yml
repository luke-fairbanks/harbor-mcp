name: AI or MCP connection problem
description: Report trouble connecting Claude, Codex, or another MCP client to Harbor.
title: "[MCP connection]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Connection details can contain sensitive values. A small sanitized excerpt is enough.

        > **Protect your privacy:** Do not post tokens, passwords, credentials, `.env` contents, or private filesystem paths. Harbor's automatic native-bridge config contains only a command path, but manual HTTP configs and `mcp.json` contain Harbor's bearer token and must not be pasted.
  - type: input
    id: harbor-version
    attributes:
      label: Harbor version
      placeholder: "0.4.1"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "15.5"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple silicon
        - Intel
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: AI client
      options:
        - Codex
        - Claude Desktop
        - Claude Code
        - Other MCP client
    validations:
      required: true
  - type: dropdown
    id: connection-method
    attributes:
      label: Connection method
      options:
        - Connect button in Harbor
        - Manual MCP configuration
        - Existing connection stopped working
        - Other
    validations:
      required: true
  - type: input
    id: client-version
    attributes:
      label: AI client version
      placeholder: Version number or build
    validations:
      required: true
  - type: dropdown
    id: client-restarted
    attributes:
      label: Client restart after bridge migration or update
      description: Migration from the v0.4.2 legacy launcher and a later bridge-binary update each require one full client restart; routine Harbor restarts do not.
      options:
        - Fully quit and reopened the client
        - Did not restart the client
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: harbor-restart
    attributes:
      label: Behavior after Harbor quits and reopens
      description: The native bridge should keep the same client session connected while Harbor restarts and rotates its token or port.
      options:
        - Connection survives the Harbor restart
        - Works until Harbor restarts, then disconnects
        - Never connects
        - Not tested
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the connection state and include only sanitized error text.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open AI connections
        2. Choose ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: sanitized-config
    attributes:
      label: Sanitized configuration or logs
      description: Optional. Include only a short excerpt. Replace tokens, usernames, project names, and paths with placeholders; do not paste `mcp.json`.
      render: shell
  - type: checkboxes
    id: privacy-check
    attributes:
      label: Privacy check
      options:
        - label: I removed tokens, credentials, `.env` contents, private URLs, and private filesystem paths from this report.
          required: true
