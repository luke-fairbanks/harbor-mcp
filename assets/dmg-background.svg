<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e9edf2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- brand -->
  <g transform="translate(300 58)">
    <g transform="translate(-86 -14)" fill="none" stroke="#0a6fff" stroke-width="2.4"
       stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="5" r="2.3"/>
      <line x1="12" y1="7.3" x2="12" y2="21"/>
      <line x1="8.2" y1="10.6" x2="15.8" y2="10.6"/>
      <path d="M4.8 13.6a7.2 7.2 0 0 0 14.4 0"/>
    </g>
    <text x="-58" y="6" font-family="-apple-system, Helvetica, sans-serif" font-size="26"
          font-weight="700" fill="#1b2630" letter-spacing="-0.5">Harbor</text>
  </g>
  <text x="300" y="86" text-anchor="middle" font-family="-apple-system, Helvetica, sans-serif"
        font-size="12.5" fill="#5b6573">MCP-native local server orchestrator</text>

  <!-- drag arrow between the app icon (left) and Applications (right) -->
  <g stroke="#aab3bf" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <line x1="262" y1="180" x2="332" y2="180"/>
    <path d="M318 166 L340 180 L318 194"/>
  </g>

  <text x="300" y="338" text-anchor="middle" font-family="-apple-system, Helvetica, sans-serif"
        font-size="12.5" fill="#7b8492">Drag Harbor onto Applications to install</text>
</svg>
